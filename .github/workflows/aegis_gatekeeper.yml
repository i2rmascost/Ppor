# THE AXIOM: Aegis Gatekeeper CI Pipeline v1.3
# วัตถุประสงค์: สกัดกั้น Configuration หรือ Code ที่ผิดพลาดก่อนขึ้น Production
# การปรับปรุง: อัปเกรด Checkout v4 และ Setup-Python v5 ป้องกัน Node.js 20 Deprecation

name: Aegis Gatekeeper Validation

on:
  push:
    branches: [ "main" ] 
  pull_request:
    branches: [ "main", "production" ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10 (Axiom Standard)
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Validation Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest jsonschema pyyaml beautifulsoup4 httpx

    - name: Phase 1 - YAML Schema Validation
      run: |
        echo "🚀 Initiating Strict YAML Schema Validation..."
        pytest tests/test_yaml_schema.py -v

    - name: Phase 2 - Parser Regression & Unit Tests
      run: |
        echo "🧪 Initiating Mock HTML Parser Tests..."
        pytest tests/test_parser_logic.py -v

    - name: Phase 3 - Security Check
      run: |
        echo "🔐 Scanning for exposed tokens..."
        ! grep -r "AXIOM_SECURE_TOKEN_V3_2026" data/ || echo "Warning: Default Token signature detected."